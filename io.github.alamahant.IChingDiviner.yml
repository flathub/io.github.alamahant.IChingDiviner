app-id: io.github.alamahant.IChingDiviner
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: IChingDiviner
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
# Needed to forward divination data to any user-configured ai model for receiving interpretation.
  - --share=network
modules:
  - name: IChingDiviner
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/alamahant/IChingDiviner.git
        tag: v1.0.1
        commit: f5d11c9adad056f2ea578ecf944d3ff54d9c4b1c
      
